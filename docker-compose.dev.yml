version: '3.8'

services:
  db:
    image: postgres:15
    container_name: hotelmanager_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-hotelmanager}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    env_file:
      - ./backend/.env

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: hotelmanager_backend
    restart: unless-stopped
    ports:
      - "${PORT:-3010}:3010"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - PORT=${PORT:-3010}
    depends_on:
      - db
    networks:
      - backend
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: hotelmanager_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - API_URL=http://backend:3010
    depends_on:
      - backend
    networks:
      - backend
    env_file:
      - ./frontend/.env

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
    name: hotelmanager_postgres_data